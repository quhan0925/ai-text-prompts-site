<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="免费中文 AI 视频提示词与 AI 文本提示词库，支持一键复制、组合复制与 RunningHub 画布嵌入。"
    />
    <title>AI视频+文本提示词库 | RunningHub适配</title>
    <link rel="stylesheet" href="assets/styles.css" />
  </head>
  <body>
    <header class="site-header">
      <h1>AI视频+文本提示词库</h1>
      <p>免费、纯静态、即用即走。适配 RunningHub 无限画布嵌入。</p>
    </header>

    <main class="container">
      <nav class="tabs" aria-label="提示词类型切换">
        <button class="tab-btn active" data-tab="video-panel" type="button">AI视频提示词</button>
        <button class="tab-btn" data-tab="text-panel" type="button">AI文本提示词</button>
      </nav>

      <section class="toolbar">
        <div class="toolbar-left">
          <strong id="selectedCount">已选 0 条</strong>
          <span class="hint">可勾选多条并合并复制</span>
        </div>
        <button id="composeCopyBtn" class="btn-primary" type="button">合并复制</button>
      </section>

      <section id="video-panel" class="panel active" aria-label="AI视频提示词内容区"></section>
      <section id="text-panel" class="panel" aria-label="AI文本提示词内容区"></section>
    </main>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <script src="assets/app.js" defer></script>
  </body>
</html>
